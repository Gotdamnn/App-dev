<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PatientPulse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 10px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
            max-width: 500px;
            width: 100%;
            padding: 40px;
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 {
            color: #2c3e50;
            margin-bottom: 10px;
            font-size: 28px;
        }

        .subtitle {
            color: #7f8c8d;
            font-size: 14px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #2c3e50;
            font-weight: 500;
            font-size: 14px;
        }

        input[type="email"],
        input[type="password"] {
            width: 100%;
            padding: 12px;
            border: 1px solid #ecf0f1;
            border-radius: 5px;
            font-size: 14px;
            transition: border-color 0.3s;
        }

        input[type="email"]:focus,
        input[type="password"]:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }

        .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }

        .alert {
            padding: 12px;
            border-radius: 5px;
            margin-bottom: 20px;
            display: none;
            font-size: 14px;
        }

        .alert.success {
            background-color: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
            display: block;
        }

        .alert.error {
            background-color: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
            display: block;
        }

        .alert.info {
            background-color: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
            display: block;
        }

        .login-link {
            text-align: center;
            margin-top: 20px;
        }

        .login-link a {
            color: #667eea;
            text-decoration: none;
            font-weight: 500;
        }

        .login-link a:hover {
            text-decoration: underline;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
        }

        .loading.show {
            display: block;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .form-container {
            display: none;
        }

        .form-container.active {
            display: block;
        }

        .steps {
            display: flex;
            justify-content: space-between;
            margin-bottom: 30px;
            font-size: 12px;
        }

        .step {
            flex: 1;
            text-align: center;
            padding-bottom: 10px;
            border-bottom: 2px solid #ecf0f1;
            color: #bdc3c7;
        }

        .step.active {
            color: #667eea;
            border-bottom-color: #667eea;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Step 1: Request Password Reset -->
        <div id="step1" class="form-container active">
            <div class="header">
                <h1>PatientPulse</h1>
                <p class="subtitle">Forgot Your Password?</p>
            </div>

            <div class="steps">
                <div class="step active">1. Verify Email</div>
                <div class="step">2. Reset Password</div>
            </div>

            <div id="alertStep1" class="alert"></div>

            <form id="forgotPasswordForm">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="Enter your email address"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" id="sendResetBtn">
                    <span class="spinner" id="spinner1" style="display: none;"></span>
                    Send Reset Link
                </button>
            </form>

            <div class="login-link">
                <p>Remember your password? <a href="/login.html">Back to Login</a></p>
            </div>
        </div>

        <!-- Step 2: Reset Password -->
        <div id="step2" class="form-container">
            <div class="header">
                <h1>PatientPulse</h1>
                <p class="subtitle">Create New Password</p>
            </div>

            <div class="steps">
                <div class="step active">1. Verify Email</div>
                <div class="step active">2. Reset Password</div>
            </div>

            <div id="alertStep2" class="alert"></div>

            <form id="resetPasswordForm">
                <div class="form-group">
                    <label for="newPassword">New Password</label>
                    <input 
                        type="password" 
                        id="newPassword" 
                        name="newPassword" 
                        placeholder="Enter new password"
                        minlength="6"
                        required
                    >
                    <small style="color: #7f8c8d; display: block; margin-top: 5px;">
                        Minimum 6 characters
                    </small>
                </div>

                <div class="form-group">
                    <label for="confirmPassword">Confirm Password</label>
                    <input 
                        type="password" 
                        id="confirmPassword" 
                        name="confirmPassword" 
                        placeholder="Confirm new password"
                        minlength="6"
                        required
                    >
                </div>

                <button type="submit" class="btn btn-primary" id="resetBtn">
                    <span class="spinner" id="spinner2" style="display: none;"></span>
                    Reset Password
                </button>
            </form>

            <div class="login-link">
                <p><a href="javascript:void(0)" onclick="goBackToStep1()">Back to Email Verification</a></p>
            </div>
        </div>
    </div>

    <script>
        // Get URL token if present
        const urlParams = new URLSearchParams(window.location.search);
        const resetToken = urlParams.get('token');

        // If token in URL, skip to step 2
        if (resetToken) {
            validateAndShowStep2(resetToken);
        }

        // ==========================================
        // STEP 1: Forgot Password Form
        // ==========================================

        document.getElementById('forgotPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const email = document.getElementById('email').value;
            const btn = document.getElementById('sendResetBtn');
            const spinner = document.getElementById('spinner1');
            const alert = document.getElementById('alertStep1');

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            alert.className = 'alert';

            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(alert, 'success', 
                        '<strong>Email Sent!</strong> Please check your email for the password reset link. It will expire in 1 hour.');
                    
                    // Store email for reference
                    sessionStorage.setItem('resetEmail', email);
                    
                    // Show resend option after 5 seconds
                    setTimeout(() => {
                        const resendHtml = `
                            Email not received? 
                            <a href="javascript:void(0)" onclick="resendResetEmail('${email}')" style="color: #667eea; text-decoration: underline;">
                                Resend Email
                            </a>
                        `;
                        alert.innerHTML += '<br>' + resendHtml;
                    }, 5000);
                } else {
                    showAlert(alert, 'info', 
                        data.message || 'Please check your email for password reset instructions.');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(alert, 'error', 'An error occurred. Please try again.');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        // Resend reset email
        async function resendResetEmail(email) {
            const alert = document.getElementById('alertStep1');
            try {
                const response = await fetch('/api/forgot-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ email })
                });

                const data = await response.json();
                if (data.success) {
                    showAlert(alert, 'success', 
                        '<strong>Email Resent!</strong> Check your inbox for the new password reset link.');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(alert, 'error', 'Failed to resend email. Please try again.');
            }
        }

        // ==========================================
        // STEP 2: Reset Password Form
        // ==========================================

        async function validateAndShowStep2(token) {
            const alert = document.getElementById('alertStep2');
            
            try {
                const response = await fetch('/api/validate-reset-token', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({ token })
                });

                const data = await response.json();

                if (data.success) {
                    // Store token for later use
                    sessionStorage.setItem('resetToken', token);
                    goToStep2();
                } else {
                    showAlert(alert, 'error', 
                        '<strong>Invalid or Expired Token</strong> Please request a new password reset link.');
                    // Redirect to forgot password after 3 seconds
                    setTimeout(() => {
                        window.location.href = '/forgot-password.html';
                    }, 3000);
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(alert, 'error', 'An error occurred. Please try again.');
            }
        }

        document.getElementById('resetPasswordForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const btn = document.getElementById('resetBtn');
            const spinner = document.getElementById('spinner2');
            const alert = document.getElementById('alertStep2');

            // Validate passwords match
            if (newPassword !== confirmPassword) {
                showAlert(alert, 'error', 'Passwords do not match.');
                return;
            }

            // Validate password length
            if (newPassword.length < 6) {
                showAlert(alert, 'error', 'Password must be at least 6 characters long.');
                return;
            }

            btn.disabled = true;
            spinner.style.display = 'inline-block';
            alert.className = 'alert';

            try {
                const token = sessionStorage.getItem('resetToken');
                
                const response = await fetch('/api/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token,
                        newPassword,
                        confirmPassword
                    })
                });

                const data = await response.json();

                if (data.success) {
                    showAlert(alert, 'success', 
                        '<strong>Success!</strong> Your password has been reset. Redirecting to login...');
                    
                    // Clear session storage
                    sessionStorage.removeItem('resetToken');
                    sessionStorage.removeItem('resetEmail');
                    
                    // Redirect to login after 2 seconds
                    setTimeout(() => {
                        window.location.href = '/login.html';
                    }, 2000);
                } else {
                    showAlert(alert, 'error', data.message || 'Failed to reset password.');
                }
            } catch (error) {
                console.error('Error:', error);
                showAlert(alert, 'error', 'An error occurred. Please try again.');
            } finally {
                btn.disabled = false;
                spinner.style.display = 'none';
            }
        });

        // ==========================================
        // Helper Functions
        // ==========================================

        function goToStep2() {
            document.getElementById('step1').classList.remove('active');
            document.getElementById('step2').classList.add('active');
        }

        function goBackToStep1() {
            sessionStorage.removeItem('resetToken');
            window.location.href = '/forgot-password.html';
        }

        function showAlert(element, type, message) {
            element.className = `alert ${type}`;
            element.innerHTML = message;
            element.scrollIntoView({ behavior: 'smooth' });
        }
    </script>
</body>
</html>
